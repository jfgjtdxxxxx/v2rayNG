name: Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout v2rayNG
        uses: actions/checkout@v4
        with:
          repository: 2dust/v2rayNG
          ref: master

      - name: Checkout libs from our repo
        uses: actions/checkout@v4
        with:
          path: our-repo

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Add default config to MainViewModel
        run: |
          FILE="V2rayNG/app/src/main/java/com/v2ray/ang/viewmodel/MainViewModel.kt"
          sed -i 's/private var serverList = mutableListOf<String>()/private var serverList = mutableListOf<String>()\n\n    fun injectDefaultConfigIfEmpty() {\n        val list = MmkvManager.decodeServerList("")\n        if (list.isEmpty()) {\n            val defaultConfig = "vless:\/\/d64cb6dc-b3e5-47a8-80be-b2355b33a0d4@r01.apanch.ir:443?type=xhttp\&encryption=mlkem768x25519plus.native.0rtt.vm_pTfXuNdAy_G2_rjcr4dMqtK4NWDu1shZMtFm-1hU\&path=%2F\&host=gr.apanchh.shop\&mode=auto\&x_padding_bytes=100-1000\&extra=%7B%22xPaddingBytes%22%3A%22100-1000%22%7D\&security=tls\&fp=chrome\&alpn=h2%2Chttp%2F1.1\&sni=gr.apanchh.shop#frnz"\n            val guid = AngConfigManager.importBatchConfig(defaultConfig, "", false)\n            if (guid != null) MmkvManager.setSelectServer(guid)\n        }\n    }/' "$FILE"

      - name: Call injectDefaultConfig in MainActivity
        run: |
          FILE="V2rayNG/app/src/main/java/com/v2ray/ang/ui/MainActivity.kt"
          sed -i 's/mainViewModel\.reloadServerList()/mainViewModel.injectDefaultConfigIfEmpty()\n        mainViewModel.reloadServerList()/' "$FILE"

      - name: Download libv2ray AAR
        run: |
          mkdir -p V2rayNG/app/libs
          curl -L "https://github.com/2dust/AndroidLibXrayLite/releases/latest/download/libv2ray.aar" \
            -o V2rayNG/app/libs/libv2ray.aar

      - name: Copy hev-socks5-tunnel from our repo
        run: |
          mkdir -p V2rayNG/app/libs/arm64-v8a
          cp our-repo/V2rayNG/app/libs/arm64-v8a/libhev-socks5-tunnel.so \
            V2rayNG/app/libs/arm64-v8a/libhev-socks5-tunnel.so
          file V2rayNG/app/libs/arm64-v8a/libhev-socks5-tunnel.so
          ls -la V2rayNG/app/libs/arm64-v8a/

      - name: Grant execute permission for gradlew
        run: cd V2rayNG && chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd V2rayNG
          mkdir -p /tmp/gradle-cache
          GRADLE_USER_HOME=/tmp/gradle-cache ./gradlew assembleFdroidDebug --no-daemon \
            -PABI_FILTERS=arm64-v8a >> /tmp/build-log.txt 2>&1 || true
          cat /tmp/build-log.txt

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: V2rayNG/app/build/outputs/apk/**/*.apk